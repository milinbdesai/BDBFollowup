<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excelsource — Division Tracker FY26-27</title>
<style>
  :root{
    --navy:#0f2a43; --navy2:#163a5c; --teal:#0e8a7d; --teal2:#13a594;
    --bg:#f4f6f9; --card:#ffffff; --line:#e2e8f0; --text:#1f2d3d; --muted:#6b7a8d;
    --red:#d64545; --amber:#e29b1c; --green:#2f9e6f; --redbg:#fdecec; --amberbg:#fdf4e3; --greenbg:#eafaf2;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
  body{background:var(--bg);color:var(--text);font-size:14px}
  button{cursor:pointer;font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:#fff;width:100%}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal)}
  textarea{resize:vertical;min-height:42px}
  .hidden{display:none!important}
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),var(--navy2))}
  .login-card{background:#fff;border-radius:12px;padding:36px 34px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .brand{font-size:22px;font-weight:800;letter-spacing:1px;color:var(--navy)}
  .brand span{color:var(--teal)}
  .sub{color:var(--muted);font-size:12px;margin:4px 0 24px}
  .login-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px}
  .btn{background:var(--teal);color:#fff;border:none;padding:11px 16px;border-radius:7px;font-weight:700;font-size:14px}
  .btn:hover{background:var(--teal2)}
  .btn.full{width:100%;margin-top:22px}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--bg)}
  .btn.sm{padding:7px 12px;font-size:12px}
  .err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}
  header{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:56px;position:sticky;top:0;z-index:50}
  header .brand{color:#fff;font-size:17px}
  header .brand span{color:var(--teal2)}
  .who{display:flex;align-items:center;gap:14px;font-size:13px}
  .badge{background:var(--teal);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  nav{background:var(--navy2);display:flex;gap:2px;padding:0 14px;overflow-x:auto;position:sticky;top:56px;z-index:40}
  nav button{background:none;border:none;color:#cbd6e2;padding:13px 16px;font-size:13px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap}
  nav button:hover{color:#fff}
  nav button.active{color:#fff;border-bottom-color:var(--teal2)}
  main{max-width:1280px;margin:0 auto;padding:22px}
  .page-title{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:3px}
  .page-sub{color:var(--muted);font-size:12px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:18px}
  .card h3{font-size:14px;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:760px){.g2,.g3,.g4{grid-template-columns:1fr}}
  .fld label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:900px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;border-left:4px solid var(--teal)}
  .kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
  .kpi .v{font-size:24px;font-weight:800;color:var(--navy);margin-top:6px}
  .kpi .x{font-size:12px;color:var(--muted);margin-top:2px}
  .kpi.red{border-left-color:var(--red)} .kpi.amber{border-left-color:var(--amber)} .kpi.green{border-left-color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--navy);color:#fff;text-align:left;padding:10px;font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;white-space:nowrap}
  td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:#fafcfe}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .tbl-wrap{overflow-x:auto}
  .bar{background:#edf1f6;border-radius:20px;height:10px;overflow:hidden;min-width:90px}
  .bar i{display:block;height:100%;background:var(--teal);border-radius:20px}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
  .p-open{background:var(--amberbg);color:var(--amber)} .p-over{background:var(--redbg);color:var(--red)}
  .p-comp{background:var(--greenbg);color:var(--green)} .p-minor{background:var(--amberbg);color:var(--amber)}
  .p-non{background:var(--redbg);color:var(--red)} .p-na{background:#eef1f4;color:var(--muted)}
  .link{color:var(--teal);background:none;border:none;font-size:12px;font-weight:700;padding:0}
  .link.del{color:var(--red)}
  .empty{text-align:center;color:var(--muted);padding:30px;font-size:13px}
  .toggle-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .chip{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--muted)}
  .chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .note{background:var(--amberbg);border:1px solid #f0dcae;border-radius:8px;padding:10px 12px;font-size:12px;color:#7a5a12;margin-bottom:16px}
  .save-flash{color:var(--green);font-size:12px;font-weight:700;margin-left:10px}
  .loader{position:fixed;inset:0;background:rgba(15,42,67,.6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;z-index:999}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="brand">EXCEL<span>SOURCE</span></div>
    <div class="sub">Division Follow-up &amp; Performance Tracker · FY 26-27</div>
    <label>User ID</label>
    <input id="u" autocomplete="off" placeholder="mgmt / div1 …">
    <label>Password</label>
    <input id="p" type="password" autocomplete="off" placeholder="••••••••">
    <button class="btn full" id="loginBtn" onclick="doLogin()">Sign in</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="brand">EXCEL<span>SOURCE</span></div>
    <div class="who">
      <span id="whoName"></span>
      <span class="badge" id="whoRole"></span>
      <button class="btn ghost sm" onclick="logout()">Logout</button>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="loader" class="loader hidden">Loading…</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =====================================================================
   CONFIG — paste your Supabase project URL + anon key here.
   (Project Settings > API). Keep EMAIL_DOMAIN in sync with schema.sql.
   ===================================================================== */
const SUPABASE_URL  = 'https://vikppbbogyprstqyfvvz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZpa3BwYmJvZ3lwcnN0cXlmdnZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MzUxMjgsImV4cCI6MjA5NzUxMTEyOH0.u7L5ADDRzE5XcH6nRug27JBMKD-L7c0kNPEFyjBnQ8g';
const EMAIL_DOMAIN  = 'es-tracker.app';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ---------- DIVISIONS + targets (from 26-27 Target.xlsx) ---------- */
const DIVISIONS = [
 {id:'div1',name:'Government Tender Business',owners:'Satyakirti Patil (SVP), AS, GD, JT',obT:450,billDone:27.92,billT:301.74},
 {id:'div2',name:'EOR Projects',owners:'SJS, RC, JKS',obT:20,billDone:4.76,billT:27.35},
 {id:'div3',name:'E&I Projects (EPC)',owners:'Maulik Jani (MUJ), Jagdish K Sadhu (JKS)',obT:90,billDone:4.50,billT:101.14},
 {id:'div4',name:'Filteration Division',owners:'Sanjay Mashru (SVM), C P Dixit (CPD)',obT:10,billDone:1.00,billT:7.07},
 {id:'div5',name:'F&B & Pharma Machinery',owners:'Tejas Karia (TRK), DB',obT:20,billDone:5.35,billT:14.05},
 {id:'div6',name:'Civil & SIKA Chemicals',owners:'Tushar (THK), Chirag Shah (CS)',obT:22,billDone:7.30,billT:16.24},
 {id:'div7',name:'HVAC Division',owners:'Harshil Rawal (HUR), Upen Rawal, MES',obT:25,billDone:8.99,billT:35.82},
 {id:'div8',name:'ChemSource',owners:'CCK, S (owner TBD)',obT:10,billDone:3.98,billT:8.00},
 {id:'div9',name:'Commodity Trading',owners:'SBB, KK',obT:30,billDone:20.82,billT:30.00},
];

/* ---------- STATE + helpers ---------- */
let SESSION=null, TAB='dash', FU=[], WK={}, PR=[], fuFilter='all';
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num=n=>(n===''||n==null||isNaN(n))?'–':Number(n).toFixed(2);
const divName=id=>{const d=DIVISIONS.find(x=>x.id===id);return d?d.name:id;};
const myDivs=()=>SESSION.role==='mgmt'?DIVISIONS:DIVISIONS.filter(d=>d.id===SESSION.divId);
const pct=(a,b)=>(!b||b<=0)?0:Math.round((a/b)*100);
const dval=v=>v?v:null;            // empty date -> null
const nval=v=>(v===''||v==null)?null:Number(v); // empty number -> null
const loader=on=>$('loader').classList.toggle('hidden',!on);

/* ---------- AUTH ---------- */
async function doLogin(){
  const u=$('u').value.trim().toLowerCase(), p=$('p').value;
  if(!u||!p){$('loginErr').textContent='Enter User ID and password.';return;}
  const email=u.includes('@')?u:`${u}@${EMAIL_DOMAIN}`;
  $('loginBtn').disabled=true; $('loginErr').textContent='';
  const {error}=await sb.auth.signInWithPassword({email,password:p});
  $('loginBtn').disabled=false;
  if(error){$('loginErr').textContent='Invalid credentials.';return;}
  await afterAuth();
}
async function afterAuth(){
  loader(true);
  const {data:{user}}=await sb.auth.getUser();
  if(!user){loader(false);return;}
  const {data:prof}=await sb.from('profiles').select('role,div_id').eq('id',user.id).single();
  const role=prof?.role||'div', divId=prof?.div_id||null;
  SESSION={role,divId,name:role==='mgmt'?'Management':(divName(divId)||user.email)};
  $('login').classList.add('hidden'); $('app').classList.remove('hidden');
  $('whoName').textContent=SESSION.name;
  $('whoRole').textContent=role==='mgmt'?'Management':'Division';
  await loadAll();
  buildNav(); TAB=role==='mgmt'?'dash':'followup'; render();
  loader(false);
}
async function logout(){ await sb.auth.signOut(); SESSION=null; $('app').classList.add('hidden'); $('login').classList.remove('hidden'); $('u').value=''; $('p').value=''; }

/* ---------- DATA ---------- */
async function loadAll(){
  const [fu,wk,pr]=await Promise.all([
    sb.from('followups').select('*'),
    sb.from('weekly_updates').select('*'),
    sb.from('projects').select('*')
  ]);
  FU=(fu.data||[]).map(r=>({id:r.id,date:r.date,divId:r.div_id,person:r.person,mode:r.mode,funnel:r.funnel,collection:r.collection,exec:r.exec_status,action:r.action,owner:r.owner,followDate:r.follow_date,status:r.status}));
  WK={}; (wk.data||[]).forEach(r=>WK[r.div_id]={obYTD:r.ob_ytd,billYTD:r.bill_ytd,weekBill:r.week_bill,weekEnding:r.week_ending});
  PR=(pr.data||[]).map(r=>({id:r.id,divId:r.div_id,name:r.name,client:r.client,order:r.order_value,billed:r.billed,collected:r.collected,exec:r.exec_pct,man:r.manpower,ehs:r.ehs,status:r.status,remarks:r.remarks}));
}

/* ---------- NAV ---------- */
function buildNav(){
  const tabs=SESSION.role==='mgmt'
    ?[['dash','Dashboard'],['followup','Daily Follow-up'],['turnover','Turnover vs Target'],['projects','Project Tracker']]
    :[['followup','My Follow-ups'],['turnover','Turnover vs Target'],['projects','My Projects']];
  $('nav').innerHTML=tabs.map(([k,l])=>`<button data-t="${k}" class="${k===TAB?'active':''}" onclick="go('${k}')">${l}</button>`).join('');
}
function go(t){TAB=t;[...document.querySelectorAll('#nav button')].forEach(b=>b.classList.toggle('active',b.dataset.t===t));render();}
function render(){TAB==='dash'?renderDash():TAB==='followup'?renderFollowup():TAB==='turnover'?renderTurnover():renderProjects();}

/* ---------- DASHBOARD ---------- */
function dueState(f){ if(f.status==='Closed'||!f.followDate)return null; if(f.followDate<today())return 'over'; if(f.followDate===today())return 'today'; return null; }
function renderDash(){
  const totBillT=DIVISIONS.reduce((s,d)=>s+d.billT,0), totObT=DIVISIONS.reduce((s,d)=>s+d.obT,0);
  let totBillYTD=0,totObYTD=0; DIVISIONS.forEach(d=>{const w=WK[d.id]; if(w){totBillYTD+=(+w.billYTD||0);totObYTD+=(+w.obYTD||0);}});
  let totBilled=0,totColl=0; PR.forEach(p=>{totBilled+=(+p.billed||0);totColl+=(+p.collected||0);});
  const outstanding=totBilled-totColl;
  const over=FU.filter(f=>dueState(f)==='over').length, dueToday=FU.filter(f=>dueState(f)==='today').length;
  const ehs={Compliant:0,'Minor Gaps':0,'Non-Compliant':0,'N/A':0}; PR.forEach(p=>{if(ehs[p.ehs]!=null)ehs[p.ehs]++;});

  let html=`<div class="page-title">Management Dashboard</div><div class="page-sub">FY 26-27 · big-picture view across all 9 divisions</div>
  <div class="kpis">
    <div class="kpi"><div class="l">Total Billing Target</div><div class="v">₹${totBillT.toFixed(1)} Cr</div><div class="x">Billed YTD ₹${totBillYTD.toFixed(1)} Cr · ${pct(totBillYTD,totBillT)}%</div></div>
    <div class="kpi teal"><div class="l">Order Booking Target</div><div class="v">₹${totObT.toFixed(0)} Cr</div><div class="x">Booked YTD ₹${totObYTD.toFixed(1)} Cr · ${pct(totObYTD,totObT)}%</div></div>
    <div class="kpi amber"><div class="l">Outstanding (Recovery)</div><div class="v">₹${outstanding.toFixed(2)} Cr</div><div class="x">Billed ₹${totBilled.toFixed(2)} · Collected ₹${totColl.toFixed(2)}</div></div>
    <div class="kpi ${over>0?'red':'green'}"><div class="l">Follow-ups</div><div class="v">${over} <span style="font-size:14px;color:var(--muted)">overdue</span></div><div class="x">${dueToday} due today</div></div>
  </div>`;

  const dueList=FU.filter(f=>dueState(f)).sort((a,b)=>(a.followDate||'').localeCompare(b.followDate||''));
  html+=`<div class="card"><h3>🔔 On My Desk — Due Today &amp; Overdue</h3>`;
  if(!dueList.length) html+=`<div class="empty">Nothing pending. All follow-ups are scheduled ahead or closed.</div>`;
  else{ html+=`<div class="tbl-wrap"><table><thead><tr><th>Follow-up Date</th><th>Division</th><th>Person</th><th>Action Item</th><th>Owner</th><th>State</th></tr></thead><tbody>`;
    dueList.forEach(f=>{const s=dueState(f);html+=`<tr><td>${esc(f.followDate)}</td><td>${esc(divName(f.divId))}</td><td>${esc(f.person)}</td><td>${esc(f.action)}</td><td>${esc(f.owner)}</td><td><span class="pill ${s==='over'?'p-over':'p-open'}">${s==='over'?'Overdue':'Due today'}</span></td></tr>`;});
    html+=`</tbody></table></div>`; }
  html+=`</div>`;

  html+=`<div class="card"><h3>Division Performance — Billing vs Target</h3><div class="tbl-wrap"><table>
    <thead><tr><th>Division</th><th class="num">Bill Target (Cr)</th><th class="num">Billed YTD</th><th>Progress</th><th class="num">Gap</th><th class="num">OB Target</th><th class="num">OB YTD</th></tr></thead><tbody>`;
  DIVISIONS.forEach(d=>{const w=WK[d.id]||{};const by=+w.billYTD||0,oy=+w.obYTD||0,pc=pct(by,d.billT);
    html+=`<tr><td><b>${esc(d.name)}</b></td><td class="num">${d.billT.toFixed(2)}</td><td class="num">${by.toFixed(2)}</td>
    <td><div style="display:flex;align-items:center;gap:8px"><div class="bar"><i style="width:${Math.min(pc,100)}%;background:${pc>=75?'var(--green)':pc>=40?'var(--teal)':'var(--amber)'}"></i></div><span style="font-size:12px;font-weight:700">${pc}%</span></div></td>
    <td class="num">${(d.billT-by).toFixed(2)}</td><td class="num">${d.obT.toFixed(0)}</td><td class="num">${oy.toFixed(2)}</td></tr>`;});
  html+=`<tr style="font-weight:800;background:#f1f5f9"><td>TOTAL</td><td class="num">${totBillT.toFixed(2)}</td><td class="num">${totBillYTD.toFixed(2)}</td><td>${pct(totBillYTD,totBillT)}%</td><td class="num">${(totBillT-totBillYTD).toFixed(2)}</td><td class="num">${totObT.toFixed(0)}</td><td class="num">${totObYTD.toFixed(2)}</td></tr></tbody></table></div></div>`;

  html+=`<div class="grid g2">
    <div class="card"><h3>EHS Compliance (across projects)</h3><div class="grid g2">
      <div class="kpi green"><div class="l">Compliant</div><div class="v">${ehs.Compliant}</div></div>
      <div class="kpi amber"><div class="l">Minor Gaps</div><div class="v">${ehs['Minor Gaps']}</div></div>
      <div class="kpi red"><div class="l">Non-Compliant</div><div class="v">${ehs['Non-Compliant']}</div></div>
      <div class="kpi"><div class="l">N/A</div><div class="v">${ehs['N/A']}</div></div></div></div>
    <div class="card"><h3>Funds — Billing &amp; Recovery</h3><table><tbody>
      <tr><td>Total Billed (projects)</td><td class="num"><b>₹${totBilled.toFixed(2)} Cr</b></td></tr>
      <tr><td>Total Collected / Recovered</td><td class="num"><b>₹${totColl.toFixed(2)} Cr</b></td></tr>
      <tr><td>Outstanding to recover</td><td class="num"><b style="color:var(--red)">₹${outstanding.toFixed(2)} Cr</b></td></tr>
      <tr><td>Recovery %</td><td class="num"><b>${pct(totColl,totBilled)}%</b></td></tr></tbody></table></div></div>`;
  $('main').innerHTML=html;
}

/* ---------- DAILY FOLLOW-UP ---------- */
function renderFollowup(){
  const locked=SESSION.role==='div';
  const divOpts=myDivs().map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('');
  let html=`<div class="page-title">Daily Follow-up — Meeting / Call Log</div>
  <div class="page-sub">Log each meeting or call. Set a Follow-up Date — it auto-surfaces on "Due Today / Overdue".</div>
  <div class="card"><h3>＋ New Entry</h3>
    <div class="grid g4">
      <div class="fld"><label>Date</label><input type="date" id="f_date" value="${today()}"></div>
      <div class="fld"><label>Division</label><select id="f_div" ${locked?'disabled':''}>${divOpts}</select></div>
      <div class="fld"><label>Person Met</label><input id="f_person" placeholder="Name"></div>
      <div class="fld"><label>Mode</label><select id="f_mode"><option>Meeting</option><option>Call</option></select></div>
    </div>
    <div class="grid g3" style="margin-top:12px">
      <div class="fld"><label>Business Funnel</label><textarea id="f_funnel" placeholder="New enquiries, quotes, order pipeline…"></textarea></div>
      <div class="fld"><label>Collection</label><textarea id="f_collection" placeholder="Payments due / received / recovery push…"></textarea></div>
      <div class="fld"><label>Execution / Implementation Status</label><textarea id="f_exec" placeholder="Project progress, blockers…"></textarea></div>
    </div>
    <div class="grid g4" style="margin-top:12px">
      <div class="fld" style="grid-column:span 2"><label>Action Item</label><input id="f_action" placeholder="What needs to happen next"></div>
      <div class="fld"><label>Owner</label><input id="f_owner" placeholder="Responsible person"></div>
      <div class="fld"><label>Follow-up Date</label><input type="date" id="f_follow"></div>
    </div>
    <div style="margin-top:14px"><button class="btn" onclick="addFU()">Save Entry</button></div>
  </div>
  <div class="toggle-row">${['all','today','over','open'].map(k=>`<span class="chip ${fuFilter===k?'active':''}" onclick="setFU('${k}')">${({all:'All',today:'Due Today',over:'Overdue',open:'Open only'})[k]}</span>`).join('')}</div>`;

  let rows=FU.slice();
  if(fuFilter==='today')rows=rows.filter(f=>dueState(f)==='today');
  else if(fuFilter==='over')rows=rows.filter(f=>dueState(f)==='over');
  else if(fuFilter==='open')rows=rows.filter(f=>f.status!=='Closed');
  rows.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const mg=SESSION.role==='mgmt';
  html+=`<div class="card"><div class="tbl-wrap"><table><thead><tr><th>Date</th>${mg?'<th>Division</th>':''}<th>Person</th><th>Funnel</th><th>Collection</th><th>Execution</th><th>Action / Owner</th><th>Follow-up</th><th>Status</th><th></th></tr></thead><tbody>`;
  if(!rows.length)html+=`<tr><td colspan="${mg?10:9}"><div class="empty">No entries yet.</div></td></tr>`;
  rows.forEach(f=>{const s=dueState(f);
    html+=`<tr><td>${esc(f.date)}</td>${mg?`<td>${esc(divName(f.divId))}</td>`:''}
      <td>${esc(f.person)}<div style="font-size:11px;color:var(--muted)">${f.mode==='Call'?'📞':'👥'} ${esc(f.mode)}</div></td>
      <td style="max-width:160px">${esc(f.funnel)||'–'}</td><td style="max-width:160px">${esc(f.collection)||'–'}</td><td style="max-width:160px">${esc(f.exec)||'–'}</td>
      <td style="max-width:180px"><b>${esc(f.action)||'–'}</b><div style="font-size:11px;color:var(--muted)">${esc(f.owner)||''}</div></td>
      <td>${esc(f.followDate)||'–'} ${s==='over'?'<span class="pill p-over">Overdue</span>':s==='today'?'<span class="pill p-open">Today</span>':''}</td>
      <td><select onchange="setStatus('${f.id}',this.value)" style="padding:5px;font-size:12px">${['Open','In Progress','Closed'].map(o=>`<option ${f.status===o?'selected':''}>${o}</option>`).join('')}</select></td>
      <td><button class="link del" onclick="delFU('${f.id}')">Delete</button></td></tr>`;});
  html+=`</tbody></table></div></div>`;
  $('main').innerHTML=html;
}
function setFU(k){fuFilter=k;renderFollowup();}
async function addFU(){
  const e={date:dval($('f_date').value),div_id:$('f_div').value,person:$('f_person').value.trim(),mode:$('f_mode').value,
    funnel:$('f_funnel').value.trim(),collection:$('f_collection').value.trim(),exec_status:$('f_exec').value.trim(),
    action:$('f_action').value.trim(),owner:$('f_owner').value.trim(),follow_date:dval($('f_follow').value),status:'Open'};
  if(!e.person&&!e.action){alert('Add at least a Person or an Action item.');return;}
  loader(true); const {error}=await sb.from('followups').insert(e);
  if(error){loader(false);alert(error.message);return;}
  await loadAll(); loader(false); renderFollowup();
}
async function setStatus(id,v){loader(true);await sb.from('followups').update({status:v}).eq('id',id);await loadAll();loader(false);render();}
async function delFU(id){if(!confirm('Delete this entry?'))return;loader(true);await sb.from('followups').delete().eq('id',id);await loadAll();loader(false);renderFollowup();}

/* ---------- TURNOVER vs TARGET ---------- */
function renderTurnover(){
  let html=`<div class="page-title">Turnover vs Target — Weekly Update</div>
  <div class="page-sub">Each division updates cumulative figures weekly. Targets are from the FY26-27 plan.</div>
  <div class="note">Fill <b>Order Booking YTD</b> and <b>Billing YTD</b> (cumulative, ₹ Cr) as of the week-ending date. % &amp; gap auto-calc.</div>
  <div class="card"><div class="tbl-wrap"><table><thead><tr><th>Division</th><th class="num">Bill Target</th><th class="num">OB Target</th><th class="num">OB YTD</th><th class="num">Billing YTD</th><th class="num">This Week Billing</th><th class="num">% Billed</th><th class="num">Gap</th><th>Week Ending</th><th></th></tr></thead><tbody>`;
  myDivs().forEach(d=>{const w=WK[d.id]||{};
    html+=`<tr><td><b>${esc(d.name)}</b><div style="font-size:11px;color:var(--muted)">${esc(d.owners)}</div></td>
      <td class="num">${d.billT.toFixed(2)}</td><td class="num">${d.obT.toFixed(0)}</td>
      <td><input type="number" step="0.01" id="ob_${d.id}" value="${w.obYTD??''}" placeholder="0" style="width:90px;text-align:right"></td>
      <td><input type="number" step="0.01" id="by_${d.id}" value="${w.billYTD??''}" placeholder="0" style="width:90px;text-align:right"></td>
      <td><input type="number" step="0.01" id="wk_${d.id}" value="${w.weekBill??''}" placeholder="0" style="width:90px;text-align:right"></td>
      <td class="num" id="pc_${d.id}">${pct(+w.billYTD||0,d.billT)}%</td>
      <td class="num" id="gp_${d.id}">${(d.billT-(+w.billYTD||0)).toFixed(2)}</td>
      <td><input type="date" id="we_${d.id}" value="${w.weekEnding||today()}" style="width:140px"></td>
      <td><button class="btn sm" onclick="saveWK('${d.id}',${d.billT})">Save</button></td></tr>`;});
  html+=`</tbody></table></div></div>`;
  $('main').innerHTML=html;
}
async function saveWK(id,billT){
  loader(true);
  const row={div_id:id,ob_ytd:nval($('ob_'+id).value),bill_ytd:nval($('by_'+id).value),week_bill:nval($('wk_'+id).value),week_ending:dval($('we_'+id).value),updated_by:SESSION.name,updated_at:new Date().toISOString()};
  const {error}=await sb.from('weekly_updates').upsert(row,{onConflict:'div_id'});
  if(error){loader(false);alert(error.message);return;}
  await loadAll(); loader(false);
  $('pc_'+id).textContent=pct(+(WK[id]?.billYTD)||0,billT)+'%';
  $('gp_'+id).textContent=(billT-(+(WK[id]?.billYTD)||0)).toFixed(2);
}

/* ---------- PROJECT TRACKER ---------- */
function renderProjects(){
  const locked=SESSION.role==='div';
  const divOpts=myDivs().map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join('');
  let html=`<div class="page-title">Project Tracker</div>
  <div class="page-sub">Per-project: order value, billing, recovery, execution, manpower &amp; EHS compliance.</div>
  <div class="card"><h3>＋ Add Project</h3>
    <div class="grid g4">
      <div class="fld"><label>Division</label><select id="p_div" ${locked?'disabled':''}>${divOpts}</select></div>
      <div class="fld"><label>Project Name</label><input id="p_name" placeholder="Project / work order"></div>
      <div class="fld"><label>Client</label><input id="p_client" placeholder="Client name"></div>
      <div class="fld"><label>Order Value (₹ Cr)</label><input type="number" step="0.01" id="p_order"></div>
    </div>
    <div class="grid g4" style="margin-top:12px">
      <div class="fld"><label>Billed (₹ Cr)</label><input type="number" step="0.01" id="p_billed"></div>
      <div class="fld"><label>Collected / Recovered (₹ Cr)</label><input type="number" step="0.01" id="p_coll"></div>
      <div class="fld"><label>Execution %</label><input type="number" step="1" id="p_exec" placeholder="0-100"></div>
      <div class="fld"><label>Manpower Deployed</label><input type="number" step="1" id="p_man" placeholder="count"></div>
    </div>
    <div class="grid g3" style="margin-top:12px">
      <div class="fld"><label>EHS Compliance</label><select id="p_ehs"><option>Compliant</option><option>Minor Gaps</option><option>Non-Compliant</option><option>N/A</option></select></div>
      <div class="fld"><label>Status</label><select id="p_status"><option>Not Started</option><option>In Progress</option><option>On Hold</option><option>Completed</option></select></div>
      <div class="fld"><label>Remarks</label><input id="p_remarks" placeholder="Notes"></div>
    </div>
    <div style="margin-top:14px"><button class="btn" onclick="addPR()">Add Project</button></div></div>`;

  let rows=PR.slice(); const mg=SESSION.role==='mgmt';
  html+=`<div class="card"><div class="tbl-wrap"><table><thead><tr>${mg?'<th>Division</th>':''}<th>Project</th><th>Client</th><th class="num">Order</th><th class="num">Billed</th><th class="num">Collected</th><th class="num">Outstanding</th><th class="num">Exec %</th><th class="num">Manpower</th><th>EHS</th><th>Status</th><th></th></tr></thead><tbody>`;
  if(!rows.length)html+=`<tr><td colspan="${mg?12:11}"><div class="empty">No projects added yet.</div></td></tr>`;
  rows.forEach(p=>{const out=(+p.billed||0)-(+p.collected||0);
    const ehsCls={'Compliant':'p-comp','Minor Gaps':'p-minor','Non-Compliant':'p-non','N/A':'p-na'}[p.ehs]||'p-na';
    html+=`<tr>${mg?`<td>${esc(divName(p.divId))}</td>`:''}
      <td><b>${esc(p.name)}</b>${p.remarks?`<div style="font-size:11px;color:var(--muted)">${esc(p.remarks)}</div>`:''}</td>
      <td>${esc(p.client)}</td><td class="num">${num(p.order)}</td><td class="num">${num(p.billed)}</td><td class="num">${num(p.collected)}</td>
      <td class="num"><b style="color:${out>0?'var(--red)':'var(--green)'}">${out.toFixed(2)}</b></td>
      <td class="num">${p.exec||0}%</td><td class="num">${p.man||0}</td>
      <td><span class="pill ${ehsCls}">${esc(p.ehs)}</span></td><td>${esc(p.status)}</td>
      <td><button class="link del" onclick="delPR('${p.id}')">Delete</button></td></tr>`;});
  html+=`</tbody></table></div></div>`;
  $('main').innerHTML=html;
}
async function addPR(){
  const e={div_id:$('p_div').value,name:$('p_name').value.trim(),client:$('p_client').value.trim(),order_value:nval($('p_order').value),
    billed:nval($('p_billed').value),collected:nval($('p_coll').value),exec_pct:nval($('p_exec').value),manpower:nval($('p_man').value),
    ehs:$('p_ehs').value,status:$('p_status').value,remarks:$('p_remarks').value.trim()};
  if(!e.name){alert('Project name is required.');return;}
  loader(true); const {error}=await sb.from('projects').insert(e);
  if(error){loader(false);alert(error.message);return;}
  await loadAll(); loader(false); renderProjects();
}
async function delPR(id){if(!confirm('Delete this project?'))return;loader(true);await sb.from('projects').delete().eq('id',id);await loadAll();loader(false);renderProjects();}
